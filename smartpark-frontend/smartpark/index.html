<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartPark — Smart Parking System</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .hero {
      min-height: calc(100vh - 64px);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 3rem 1.5rem;
      background: radial-gradient(ellipse at 60% 40%, rgba(0,229,255,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 30% 70%, rgba(124,58,237,0.06) 0%, transparent 60%);
    }
    .hero-inner { max-width: 680px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2);
      color: var(--accent); padding: 0.35rem 1rem; border-radius: 999px;
      font-size: 0.8rem; font-weight: 500; margin-bottom: 1.5rem; letter-spacing: 0.5px;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800; line-height: 1.1; margin-bottom: 1.25rem;
    }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; max-width: 480px; margin-left: auto; margin-right: auto; }
    .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .demo-section { max-width: 860px; margin: 0 auto; padding: 4rem 1.5rem; text-align: center; }
    .demo-section h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .demo-section p  { color: var(--muted); margin-bottom: 2rem; }
    .demo-lot { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; display: inline-block; width: 100%; }
    .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
    .mini-slot { aspect-ratio: 1; border-radius: 8px; display: grid; place-items: center; font-size: 1.1rem; transition: background 0.4s; }
    .ms-avail { background: rgba(34,197,94,0.15);  border: 1px solid rgba(34,197,94,0.3); }
    .ms-occ   { background: rgba(239,68,68,0.15);   border: 1px solid rgba(239,68,68,0.3); }
    .ms-res   { background: rgba(245,158,11,0.15);  border: 1px solid rgba(245,158,11,0.3); }
    .lot-legend { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }
    .auth-panel {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px); display: none; place-items: center; z-index: 300;
    }
    .auth-panel.open { display: grid; }
    .auth-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem; width: 90%; max-width: 420px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5); animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .close-auth {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--muted);
      font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 0.25rem;
    }
    .close-auth:hover { color: var(--text); }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 1.5rem; text-align: center; }
    .auth-tabs { display: flex; gap: 0.25rem; background: var(--surface2); padding: 0.25rem; border-radius: 10px; margin-bottom: 1.75rem; }
    .auth-tab {
      flex: 1; padding: 0.55rem; border-radius: 8px; font-size: 0.875rem;
      font-weight: 500; cursor: pointer; color: var(--muted);
      transition: all 0.2s; border: none; background: none;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-tab.active { background: var(--bg); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">Smart<span>Park</span></a>
  <div class="nav-links">
    <a href="#demo">Live Demo</a>
  </div>
  <div style="display:flex;gap:0.75rem">
    <button class="btn btn-secondary btn-sm" onclick="openAuth('login')">Login</button>
    <button class="btn btn-primary btn-sm" onclick="openAuth('signup')">Sign Up</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge">🅿️ Real-Time Parking Management</div>
    <h1>Park Smarter,<br><span>Not Harder</span></h1>
    <p>Find, book and manage parking slots in real-time. No more circling — your spot is waiting.</p>
    <div class="hero-btns">
      <button class="btn btn-primary" onclick="openAuth('signup')">Get Started Free</button>
      <button class="btn btn-secondary" onclick="openAuth('login')">Sign In</button>
    </div>
  </div>
</section>

<section id="demo">
  <div class="demo-section">
    <h2>Live Slot Availability</h2>
    <p>Watch slots update in real-time as cars arrive and leave</p>
    <div class="demo-lot">
      <div class="mini-grid" id="demo-grid"></div>
      <div class="lot-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Available</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Occupied</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Reserved</div>
      </div>
    </div>
  </div>
</section>

<div class="auth-panel" id="auth-panel">
  <div class="auth-box" style="position:relative">
    <button class="close-auth" onclick="closeAuth()">×</button>
    <div class="auth-logo">SmartPark 🅿️</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-form active" id="form-login">
      <div id="login-alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn btn-primary" style="width:100%" id="login-btn" onclick="doLogin()">Login</button>
    </div>
    <div class="auth-form" id="form-signup">
      <div id="signup-alert"></div>
      <div class="grid-2" style="gap:1rem">
        <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" placeholder="John Doe" /></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="reg-phone" placeholder="+91 9999999999" /></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Vehicle Number</label><input type="text" id="reg-vehicle" placeholder="UP32 AB 1234" style="text-transform:uppercase" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Min 6 characters" /></div>
      <button class="btn btn-primary" style="width:100%" id="signup-btn" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
  // Demo grid
  const statuses = ['ms-avail','ms-avail','ms-avail','ms-occ','ms-occ','ms-avail','ms-res','ms-avail','ms-occ','ms-avail'];
  const icons    = ['🚗','','','🚗','🚗','','','🚗','🚗',''];
  const grid = document.getElementById('demo-grid');
  statuses.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = `mini-slot ${s}`;
    d.textContent = icons[i];
    grid.appendChild(d);
  });
  setInterval(() => {
    const slots = grid.querySelectorAll('.mini-slot');
    const idx = Math.floor(Math.random() * slots.length);
    slots[idx].className = 'mini-slot ' + ['ms-avail','ms-occ','ms-res'][Math.floor(Math.random()*3)];
  }, 2000);

  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const user = getUser();
    window.location.href = user?.role === 'admin' ? 'pages/admin.html' : 'pages/dashboard.html';
  }

  function openAuth(tab)  { document.getElementById('auth-panel').classList.add('open'); switchTab(tab); }
  function closeAuth()    { document.getElementById('auth-panel').classList.remove('open'); }
  function switchTab(t) {
    ['login','signup'].forEach(x => {
      document.getElementById('tab-'+x).classList.toggle('active', x===t);
      document.getElementById('form-'+x).classList.toggle('active', x===t);
    });
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const alertEl = document.getElementById('login-alert');
    const btn = document.getElementById('login-btn');
    alertEl.innerHTML = '';
    if (!email || !password) { alertEl.innerHTML = '<div class="alert alert-error">Fill all fields</div>'; return; }
    btn.disabled = true; btn.textContent = 'Logging in…';
    try {
      const user = await Auth.login(email, password);
      showToast('Welcome back, ' + user.name + '!');
      setTimeout(() => { window.location.href = user.role === 'admin' ? 'pages/admin.html' : 'pages/dashboard.html'; }, 600);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  async function doSignup() {
    const alertEl = document.getElementById('signup-alert');
    const btn = document.getElementById('signup-btn');
    alertEl.innerHTML = '';
    const payload = {
      name:          document.getElementById('reg-name').value.trim(),
      email:         document.getElementById('reg-email').value.trim(),
      password:      document.getElementById('reg-password').value,
      phone:         document.getElementById('reg-phone').value.trim(),
      vehicleNumber: document.getElementById('reg-vehicle').value.trim().toUpperCase(),
    };
    if (!payload.name || !payload.email || !payload.password) {
      alertEl.innerHTML = '<div class="alert alert-error">Name, email & password are required</div>'; return;
    }
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const user = await Auth.register(payload);
      showToast('Account created! Welcome, ' + user.name);
      setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 600);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('form-login').classList.contains('active')) doLogin();
      else doSignup();
    }
  });
</script>
</body>
</html>
