<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Bookings — SmartPark</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/index.html" class="logo">Smart<span>Park</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="slots.html">Book Slot</a>
    <a href="my-bookings.html" class="active">My Bookings</a>
    <span id="admin-link" style="display:none"><a href="admin.html">Admin</a></span>
  </div>
  <div id="nav-user"></div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>My Bookings</h1>
    <p>Your complete parking history</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="filterBookings('all', this)">All</button>
    <button class="tab" onclick="filterBookings('active', this)">Active</button>
    <button class="tab" onclick="filterBookings('completed', this)">Completed</button>
    <button class="tab" onclick="filterBookings('cancelled', this)">Cancelled</button>
  </div>

  <div class="card">
    <div id="bookings-container"><div class="loading-center"><div class="spinner"></div></div></div>
  </div>
</main>

<!-- Checkout receipt modal -->
<div class="modal-overlay" id="receipt-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>🧾 Parking Receipt</h3>
      <button class="modal-close" onclick="document.getElementById('receipt-modal').classList.remove('open')">×</button>
    </div>
    <div id="receipt-content"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="document.getElementById('receipt-modal').classList.remove('open')">Close</button>
  </div>
</div>

<script src="/public/js/api.js"></script>
<script src="/public/js/utils.js"></script>
<script>
  requireAuth();
  const user = getUser();
  if (user?.role === 'admin') document.getElementById('admin-link').style.display = '';

  let allBookings = [];
  let currentFilter = 'all';

  async function loadBookings() {
    const container = document.getElementById('bookings-container');
    try {
      allBookings = await Bookings.my();
      renderBookings();
    } catch(e) {
      container.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  function filterBookings(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderBookings();
  }

  function renderBookings() {
    const container = document.getElementById('bookings-container');
    const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No ${currentFilter === 'all' ? '' : currentFilter} bookings found</p></div>`;
      return;
    }
    container.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead><tr><th>Slot</th><th>Floor</th><th>Vehicle</th><th>Type</th><th>Entry</th><th>Exit</th><th>Duration</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${filtered.map(b => `
            <tr>
              <td><strong>${b.slot?.slotNumber || '—'}</strong></td>
              <td>${b.slot?.floor || '—'}</td>
              <td>${b.vehicleNumber}</td>
              <td>${b.bookingType}</td>
              <td style="font-size:0.8rem;white-space:nowrap">${fmtDate(b.entryTime)}</td>
              <td style="font-size:0.8rem;white-space:nowrap">${fmtDate(b.exitTime)}</td>
              <td>${fmtDuration(b.duration)}</td>
              <td>${b.totalAmount ? fmtCurrency(b.totalAmount) : '—'}</td>
              <td><span class="badge badge-${b.status}">${b.status}</span></td>
              <td>
                <div style="display:flex;gap:0.5rem">
                  ${b.status === 'active' ? `
                    <button class="btn btn-danger btn-sm" onclick="doCheckout('${b._id}')">Check Out</button>
                    <button class="btn btn-secondary btn-sm" onclick="doCancel('${b._id}')">Cancel</button>
                  ` : b.status === 'completed' ? `
                    <button class="btn btn-secondary btn-sm" onclick="showReceipt(${JSON.stringify(b).replace(/"/g,'&quot;')})">Receipt</button>
                  ` : '—'}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table></div>`;
  }

  async function doCheckout(id) {
    if (!confirm('Confirm check-out?')) return;
    try {
      const b = await Bookings.checkout(id);
      showToast(`Checked out! ${fmtCurrency(b.totalAmount)}`);
      showReceipt(b);
      loadBookings();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function doCancel(id) {
    if (!confirm('Cancel this booking?')) return;
    try {
      await Bookings.cancel(id);
      showToast('Booking cancelled');
      loadBookings();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function showReceipt(b) {
    document.getElementById('receipt-content').innerHTML = `
      <div style="border:1px dashed var(--border);border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;font-size:0.875rem">
        <div style="text-align:center;margin-bottom:0.5rem">
          <div style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800">${b.slot?.slotNumber || '—'}</div>
          <div style="color:var(--muted);font-size:0.75rem">Floor ${b.slot?.floor || '—'}</div>
        </div>
        <hr style="border-color:var(--border)">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Vehicle</span><strong>${b.vehicleNumber}</strong></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Entry</span><span>${fmtDate(b.entryTime)}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Exit</span><span>${fmtDate(b.exitTime)}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Duration</span><span>${b.duration}h</span></div>
        <hr style="border-color:var(--border)">
        <div style="display:flex;justify-content:space-between;font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800">
          <span>Total</span><span style="color:var(--accent)">${fmtCurrency(b.totalAmount)}</span>
        </div>
      </div>`;
    document.getElementById('receipt-modal').classList.add('open');
  }

  loadBookings();
</script>
</body>
</html>
